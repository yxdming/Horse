# =============================================================================
# RubikSQL GUI - Conda Environment
# =============================================================================
# Minimal, clean environment for RubikSQL GUI development and packaging.
#
# Create environment:
#   conda env create -f environment.yml
#
# Update environment:
#   conda env update -f environment.yml --prune
#
# Activate:
#   conda activate rubiksql
# =============================================================================

name: rubiksql
channels:
  - defaults
dependencies:
  # Python version
  - python=3.11
  
  # Build tools
  - pip
  - setuptools
  - wheel
  
  # pip dependencies (all Python packages)
  - pip:
    # -------------------------------------------------------------------------
    # FastAPI Backend
    # -------------------------------------------------------------------------
    - fastapi>=0.104.0
    - uvicorn[standard]>=0.24.0
    - pydantic>=2.0.0
    
    # -------------------------------------------------------------------------
    # AgentHeaven Core (from requirements.txt)
    # -------------------------------------------------------------------------
    - babel>=2.17.0
    - click>=8.0
    - cloudpickle>=2.0
    - dill>=0.3
    - diskcache>=5.0
    - docstring-parser>=0.15
    - isodate>=0.6
    - Jinja2>=3.0
    - litellm>=1.0
    - openai>=1.0
    - polib>=1.2.0
    - prettytable>=3.17.0
    - pyyaml>=6.0
    - requests>=2.28
    - tenacity>=8.0
    - termcolor>=2.0
    - prompt_toolkit>=3.0
    
    # -------------------------------------------------------------------------
    # Database Drivers & SQL
    # -------------------------------------------------------------------------
    - asyncpg
    - duckdb-engine
    - duckdb>=1.0
    - psycopg2-binary
    - pymysql
    - pymongo>=4.0
    - sqlalchemy>=2.0
    - sqlglot>=20.0
    
    # -------------------------------------------------------------------------
    # LanceDB & LlamaIndex (for KB features)
    # -------------------------------------------------------------------------
    - fastmcp
    - lancedb
    - llama-index-core>=0.10
    - llama-index-vector-stores-lancedb
    - pyarrow
    
    # -------------------------------------------------------------------------
    # NLP & Utilities
    # -------------------------------------------------------------------------
    - spacy
    - pyahocorasick
    
    # -------------------------------------------------------------------------
    # LLM Providers
    # -------------------------------------------------------------------------
    - ollama
    
    # -------------------------------------------------------------------------
    # Packaging
    # -------------------------------------------------------------------------
    - pyinstaller>=6.0
    
    # -------------------------------------------------------------------------
    # Development Tools
    # -------------------------------------------------------------------------
    - pytest>=7.0
    - pytest-asyncio>=0.21.0
    - black>=23.0
    - flake8>=6.0
    - httpx>=0.24.0
